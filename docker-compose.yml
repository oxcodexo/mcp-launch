name: "mcp-stack"


services:


  # ── Caddy reverse proxy ─────────────────────────────────────
  caddy:
    image: caddy:alpine
    container_name: caddy
    ports:
      - "9876:9876"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - mcp-sandbox
    restart: unless-stopped


  # ── ngrok tunnel ────────────────────────────────────────────
  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    environment:
      NGROK_AUTHTOKEN: "${NGROK_AUTHTOKEN}"
    command: http caddy:9876 --url=${NGROK_DOMAIN} --log stdout
    ports:
      - "4040:4040"   # ngrok dashboard → http://localhost:4040
    depends_on:
      - caddy
    restart: unless-stopped


  # ── Agent Sandbox ─────────────────────────────────────────
  # A self-contained environment the agent can execute shell commands in.
  # /workspace is mounted from the host path defined in SANDBOX_MOUNT_PATH.
  # The agent has full shell access but is confined to this container.
  mcp-sandbox:
    build:
      context: ./docker/sandbox
      dockerfile: Dockerfile
    container_name: mcp-sandbox
    command: >
      --stdio "uvx terminal_controller"
      --outputTransport streamableHttp
      --streamableHttpPath /mcp
      --port 9002
      --bearerToken "${MCP_BEARER_TOKEN}"
    volumes:
      - ${SANDBOX_MOUNT_PATH}:/workspace
    expose:
      - "9002"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped