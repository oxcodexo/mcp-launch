name: "mcp-stack"

services:

  # ── Caddy reverse proxy ─────────────────────────────────────
  caddy:
    image: caddy:alpine
    ports:
      - "9876:9876"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - mcp-filesystem
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── ngrok tunnel ────────────────────────────────────────────
  ngrok:
    image: ngrok/ngrok:latest
    environment:
      NGROK_AUTHTOKEN: "${NGROK_AUTHTOKEN}"
    command: http caddy:9876 --url=${NGROK_DOMAIN} --log stdout
    ports:
      - "4040:4040"   # ngrok dashboard → http://localhost:4040
    depends_on:
      - caddy
    restart: unless-stopped

  # ── Filesystem MCP (bridge network) ────────────────────────
  mcp-filesystem:
    image: ghcr.io/supercorp-ai/supergateway:latest
    command: >
      --stdio "npx @modelcontextprotocol/server-filesystem /kb"
      --outputTransport streamableHttp
      --streamableHttpPath /mcp
      --port 9001
      --bearerToken "${MCP_BEARER_TOKEN}"
    volumes:
      - /home/oxcodexo/projects/obsidian/kb:/kb
    expose:
      - "9001"
    restart: unless-stopped
